<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Weather Hub</title>
    <!-- Stable production Tailwind layout stylesheet -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-gradient-to-br from-slate-900 to-indigo-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-1 text-center text-blue-400">Global Weather Hub</h1>
        <p class="text-xs text-gray-400 text-center mb-6">Production Connected Layer</p>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="cityInput" placeholder="Enter city name (e.g., California)" 
                   class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none">
            <button id="searchBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold text-sm px-4 py-2 rounded-xl">
                Search
            </button>
        </div>

        <div id="weatherResult" class="hidden space-y-4">
            <div class="text-center">
                <h2 id="cityName" class="text-xl font-bold text-white">---</h2>
                <p id="weatherDesc" class="text-sm text-gray-400 capitalize">---</p>
            </div>
            <div class="flex justify-around items-center bg-gray-900 p-4 rounded-xl border border-gray-700">
                <div class="text-center">
                    <span class="text-xs text-gray-400 block">Temperature</span>
                    <span id="temp" class="text-xl font-bold text-blue-300">--°C</span>
                </div>
                <div class="text-center">
                    <span class="text-xs text-gray-400 block">Humidity</span>
                    <span id="humidity" class="text-xl font-bold text-emerald-400">--%</span>
                </div>
            </div>
        </div>
        
        <div id="errorState" class="hidden text-sm text-red-400 bg-red-950 p-3 rounded-xl text-center"></div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const cityInput = document.getElementById('cityInput');
        const weatherResult = document.getElementById('weatherResult');
        const errorState = document.getElementById('errorState');

        searchBtn.addEventListener('click', async () => {
            const city = cityInput.value.trim();
            if (!city) return;

            errorState.classList.add('hidden');
            weatherResult.classList.add('hidden');

            try {
                // Calling your secure serverless Node.js backend function relative endpoint
                const response = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Failed to fetch weather data.');

                document.getElementById('cityName').innerText = `${data.name}, ${data.sys.country}`;
                document.getElementById('weatherDesc').innerText = data.weather.description;
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°C`;
                document.getElementById('humidity').innerText = `${data.main.humidity}%`;
                
                weatherResult.classList.remove('hidden');
            } catch (err) {
                errorState.innerText = err.message;
                errorState.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
